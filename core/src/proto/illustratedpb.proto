syntax = "proto3";

// 图鉴相关
package gamepb.illustratedpb;

import "corepb.proto";

service IllustratedService {
  rpc GetIllustratedListV2(GetIllustratedListV2Request) returns (GetIllustratedListV2Reply);
  rpc ClaimAllRewardsV2(ClaimAllRewardsV2Request) returns (ClaimAllRewardsV2Reply);
}

message GetIllustratedListV2Request {
    bool refresh = 1;
//    bool full = 2;
    int32 illustrated_type = 2; // 1 = crop illustrated tab, 2 = mutant illustrated tab
}

message IllustratedItem {
    int64 seed_id = 1;
    int32 illustrated_tier = 2;
    bool unlocked = 3;
    int32 reward_score = 4;
    int32 harvest_count = 5;
    bytes reward_info = 6;
    bool has_reward = 7;
}

message GetIllustratedListV2Reply {
    repeated IllustratedItem items = 1;
    int32 current_score = 2;
    int32 level = 3;
    bytes level_reward = 4;
    repeated int32 unlocked_tiers = 5;
    int32 current_tier = 6;
    int32 next_score = 7;
    bool has_level_reward = 9;
    repeated corepb.Item level_rewards = 10;
    repeated corepb.Item next_level_rewards = 11;
}

message ClaimAllRewardsV2Request {
    bool only_claimable = 1;
}

message ClaimAllRewardsV2Reply {
    repeated corepb.Item items = 1;
    repeated corepb.Item bonus_items = 4;
}

message IllustratedRewardRedDotNotifyV2 {}
