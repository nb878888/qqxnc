syntax = "proto3";

package gamepb.dogpb;

message DogInfo {
    int64 id = 1;
    int64 expire_time = 3;
    int32 status = 4;
    int32 level = 5;
    int32 active = 7;
}

message GetDogInfoRequest {
    int64 host_gid = 1;
}

message GetDogInfoReply {
    repeated DogInfo dogs = 1;
    int64 coin = 3;
    int64 protect_time = 4;
    repeated DogFood foods = 5;
}

message DogFood {
    int64 id = 1;
    int64 duration = 2;
    int32 count = 3;
}
